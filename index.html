<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brain-It-On Benchmark Prototype</title>
  </head>
  <body>
    <main id="app" class="app-shell">
      <section class="game-panel" aria-label="Playable physics level">
        <canvas id="game" aria-label="Lift the ball off the ground"></canvas>
      </section>
      <aside class="control-panel" aria-label="Level controls">
        <div class="mode-tabs" aria-label="Mode">
          <button id="play-mode" class="active" type="button">Draw</button>
          <button id="trace-mode" type="button">Trace</button>
        </div>
        <div>
          <p id="mode-eyebrow" class="eyebrow">Playable V1</p>
          <h1 id="level-title">Lift the ball off the ground</h1>
          <p id="level-copy" class="copy">Draw one heavy stroke. Release to let it fall, push, tip, or wedge the ball upward.</p>
        </div>
        <div id="play-stats" class="status-grid">
          <div>
            <label class="select-label" for="level-select">Level</label>
            <select id="level-select">
              <option value="ground-left-wall-v1">Ground left wall</option>
              <option value="hit-left-wall-v1">Cup left wall</option>
            </select>
          </div>
          <div>
            <span>Status</span>
            <strong id="status">Ready</strong>
          </div>
          <div>
            <span>Goal</span>
            <strong id="goal">Off ground for 150 frames</strong>
          </div>
          <div>
            <span>Stroke</span>
            <strong id="stroke-count">0 / 1</strong>
          </div>
        </div>
        <div id="trace-stats" class="trace-summary" hidden>
          <div class="trace-badges" aria-label="Trace metadata">
            <span id="trace-result">Waiting</span>
            <span id="trace-frame">0 / 0</span>
            <span id="trace-quiet">0 frames</span>
          </div>
        </div>
        <div id="play-controls" class="button-row">
          <button id="toggle-run" type="button">Pause</button>
          <button id="toggle-physics" type="button">Show physics</button>
          <button id="reset" type="button">Reset</button>
          <button id="clear-stroke" type="button">Clear stroke</button>
        </div>
        <div id="trace-controls" class="trace-controls" hidden>
          <div id="run-browser" class="run-browser">
            <div class="run-browser-head">
              <div>
                <span class="select-label">Agent runs</span>
                <strong id="run-browser-status">Scanning</strong>
              </div>
              <div class="run-browser-actions">
                <button id="trace-play" class="primary-play" type="button">
                  <span id="trace-play-icon" aria-hidden="true">▶</span>
                  <span id="trace-play-label">Play</span>
                </button>
                <button id="run-browser-refresh" type="button">Refresh</button>
              </div>
            </div>
            <label class="select-label" for="run-browser-agent">Agent</label>
            <select id="run-browser-agent"></select>
            <label class="select-label" for="run-browser-level">Level</label>
            <select id="run-browser-level"></select>
            <label class="select-label" for="run-browser-attempt">Attempt</label>
            <select id="run-browser-attempt"></select>
            <div class="button-row">
              <button id="run-browser-prev" type="button">Previous run</button>
              <button id="run-browser-next" type="button">Next run</button>
            </div>
            <div class="trace-reasoning">
              <span>Reasoning</span>
              <strong id="trace-reasoning">No AI reasoning recorded.</strong>
            </div>
          </div>
          <label class="file-picker" for="run-bundle">
            <span>Upload run bundle</span>
            <input id="run-bundle" type="file" accept="application/json,.json" />
          </label>
          <input id="trace-scrubber" type="range" min="0" max="0" value="0" />
          <div class="trace-transport">
            <label class="toggle-control" for="trace-physics">
              <input id="trace-physics" type="checkbox" />
              <span>Physics</span>
            </label>
            <label class="speed-control" for="trace-speed">
              <span>Speed</span>
              <select id="trace-speed">
                <option value="0.25">0.25x</option>
                <option value="0.5">0.5x</option>
                <option value="1" selected>1x</option>
                <option value="2">2x</option>
                <option value="4">4x</option>
              </select>
            </label>
          </div>
        </div>
        <div id="stroke-export">
          <label class="json-label" for="stroke-json">Current stroke JSON</label>
          <textarea id="stroke-json" readonly spellcheck="false" placeholder="Draw a stroke to export points."></textarea>
        </div>
      </aside>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
